name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore leishen/leishen.csproj

      - name: Build Release
        run: dotnet publish leishen/leishen.csproj -c Release -r win-x86 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Create Release Archive
        run: |
          Compress-Archive -Path leishen/bin/Release/net8.0-windows/win-x86/publish/* -DestinationPath leishen-publish.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PUBG助手 ${{ github.ref_name }}
          body: |
            ## PUBG助手 ${{ github.ref_name }}

            ### 更新说明
            自动打包发布

            ### 下载
            - `leishen-publish.zip` — 完整的发布包（含 .NET 运行时的单文件 exe）
          files: leishen-publish.zip
          generate_release_notes: true
